name: Build APK + Deploy to FTP

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-apk:
    name: Build Android Debug APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant execute permission for gradlew
        run: chmod +x android/gradlew

      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon

      - name: Rename APK
        run: |
          mkdir -p release-apk
          cp android/app/build/outputs/apk/debug/app-debug.apk release-apk/qmol-android.apk
          echo "APK size: $(du -sh release-apk/qmol-android.apk)"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: qmol-android-apk
          path: release-apk/qmol-android.apk
          retention-days: 90

      - name: Copy APK to landing folder for FTP
        run: cp release-apk/qmol-android.apk landing/qmol-android.apk

      # ── FTP Deploy ──────────────────────────────────────────────────────────
      - name: Backup existing FTP site
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        continue-on-error: true
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          server-dir: /qmol-backup/
          local-dir: ./landing/
          dry-run: false
          log-level: minimal

      - name: Deploy landing/ + APK to FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          server-dir: /qmol/
          local-dir: ./landing/
          dangerous-clean-slate: true
          log-level: standard
